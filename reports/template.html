<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <style>
    :root {
      --bg: #f8fafc;
      --panel: #ffffff;
      --panel-alt: #ffffff;
      --text: #0f172a;
      --muted: #475569;
      --border: #e2e8f0;
      --accent: #0f766e;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 32px;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .hero, section, .metric-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
    }

    .hero {
      padding: 28px;
      margin-bottom: 24px;
    }

    .hero h1 {
      margin: 0 0 8px;
      font-size: 2rem;
    }

    .hero p {
      margin: 4px 0;
      color: var(--muted);
    }

    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .metric-card {
      padding: 20px;
    }

    .metric-card h3 {
      margin: 0 0 10px;
      font-size: 0.95rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .metric-card strong {
      font-size: 1.9rem;
      display: block;
    }

    section {
      padding: 24px;
      margin-bottom: 18px;
    }

    section h2 {
      margin-top: 0;
      margin-bottom: 16px;
      font-size: 1.25rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--panel-alt);
      border-radius: 12px;
      overflow: hidden;
    }

    th, td {
      text-align: left;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
    }

    th {
      background: #f1f5f9;
      font-size: 0.9rem;
    }

    ul {
      margin: 0;
      padding-left: 18px;
    }

    .pill {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.85rem;
      margin-right: 8px;
      background: #ecfeff;
      color: var(--accent);
    }
    .muted { color: var(--muted); }
  </style>
</head>
<body>
  <div class="container">
    {{BODY}}
  </div>
</body>
</html>
